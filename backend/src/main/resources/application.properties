spring.application.name=tjjud-book-catalog-api
spring.application.version=${APP_VERSION:local}
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tjjud_catalog}
spring.datasource.username=${DB_USERNAME:tjjud}
spring.datasource.password=${DB_PASSWORD:tjjud}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.messages.basename=messages
spring.messages.encoding=UTF-8

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.observations.annotations.enabled=true
management.tracing.enabled=true
management.tracing.propagation.type=w3c
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.tracing.opentelemetry.export.include-unsampled=true
management.opentelemetry.resource-attributes.service.namespace=tjjud
management.opentelemetry.resource-attributes.deployment.environment=${OTEL_ENVIRONMENT:local}
management.otlp.tracing.transport=${MANAGEMENT_OTLP_TRACING_TRANSPORT:http}
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}}}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.org.hibernate.SQL=warn
logging.level.org.springframework.web=info
