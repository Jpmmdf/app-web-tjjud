spring.application.name=tjjud-book-catalog-api
spring.application.version=${APP_VERSION:local}
spring.profiles.default=dev
server.port=${SERVER_PORT:8080}
spring.datasource.driver-class-name=org.postgresql.Driver
app.api.public-url=${APP_PUBLIC_URL:http://localhost:${server.port}}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.messages.basename=messages
spring.messages.encoding=UTF-8

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.observations.annotations.enabled=true
management.tracing.enabled=true
management.tracing.opentelemetry.export.include-unsampled=true
management.tracing.propagation.type=w3c
management.opentelemetry.resource-attributes.service.namespace=tjjud

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.org.hibernate.SQL=warn
logging.level.org.springframework.web=info
