app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
app.api.public-url=${APP_PUBLIC_URL:http://localhost:${server.port}}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tjjud_catalog}
spring.datasource.username=${DB_USERNAME:tjjud}
spring.datasource.password=${DB_PASSWORD:tjjud}

management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.0}
management.opentelemetry.resource-attributes.deployment.environment=${OTEL_ENVIRONMENT:build}
management.otlp.tracing.transport=${MANAGEMENT_OTLP_TRACING_TRANSPORT:http}
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}}}
