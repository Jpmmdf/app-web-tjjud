app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://front-demo.pavim.com.br}
app.api.public-url=${APP_PUBLIC_URL:https://front-demo.pavim.com.br}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.0}
management.opentelemetry.resource-attributes.deployment.environment=${OTEL_ENVIRONMENT:prod}
management.otlp.tracing.transport=${MANAGEMENT_OTLP_TRACING_TRANSPORT:http}
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}}}
