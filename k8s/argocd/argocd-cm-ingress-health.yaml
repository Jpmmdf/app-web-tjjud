apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  resource.customizations.health.networking.k8s.io_Ingress: |
    hs = {}
    if obj.status and obj.status.loadBalancer and obj.status.loadBalancer.ingress and #obj.status.loadBalancer.ingress > 0 then
      hs.status = "Healthy"
      hs.message = "Ingress has a published load balancer address"
      return hs
    end

    local hasRules = obj.spec and obj.spec.rules and #obj.spec.rules > 0
    local ingressClass = obj.spec and obj.spec.ingressClassName or nil
    local annotations = obj.metadata and obj.metadata.annotations or {}
    local usesTraefik = ingressClass == "traefik"
      or annotations["kubernetes.io/ingress.class"] == "traefik"
      or annotations["traefik.ingress.kubernetes.io/router.entrypoints"] ~= nil

    if hasRules and usesTraefik then
      hs.status = "Healthy"
      hs.message = "Traefik ingress configured without loadBalancer status"
      return hs
    end

    hs.status = "Progressing"
    hs.message = "Waiting for ingress controller to publish status"
    return hs
