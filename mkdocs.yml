site_name: app-web-tjjud Docs
site_description: Documentacao tecnica, operacional e de entrega do app-web-tjjud
site_url: https://jpmmdf.github.io/app-web-tjjud/
repo_name: app-web-tjjud
repo_url: https://github.com/Jpmmdf/app-web-tjjud
edit_uri: edit/main/docs/

theme:
  name: readthedocs
  highlightjs: true

nav:
  - Inicio: index.md
  - Visao Geral:
      - Demo e Acessos: overview/demo.md
  - Arquitetura:
      - Panorama: architecture/overview.md
      - C4 e Structurizr: architecture/c4.md
      - Decisoes: architecture/decisions.md
  - Referencia:
      - API: reference/api.md
      - Dados: reference/data.md
  - Operacao:
      - Runtime: operations/runtime.md
      - GitOps e Demo: operations/gitops.md
      - Release e Imagens: operations/release.md
  - Comecando:
      - Onboarding: getting-started/onboarding.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
