<section class="panel panel--govbr card border-0">
  <div class="panel__header">
    <div>
      <p class="eyebrow">{{ texts.eyebrow }}</p>
      <h2>{{ editingAuthorId() === null ? texts.createTitle : texts.editTitle }}</h2>
    </div>

    <a class="btn btn-outline-secondary" routerLink="/autores">{{ texts.backToList }}</a>
  </div>

  <form class="card-form card border-0 shadow-sm" [formGroup]="authorForm" (ngSubmit)="submitAuthor()" novalidate>
    <label class="field">
      <span class="form-label mb-0">{{ texts.fieldLabel }}</span>
      <input class="form-control" type="text" formControlName="name" maxlength="40" [placeholder]="texts.fieldPlaceholder" />
    </label>

    @if (authorForm.controls.name.touched && authorForm.controls.name.invalid) {
      <p class="field-error invalid-feedback d-block">{{ texts.fieldError }}</p>
    }

    <div class="form-actions">
      <button type="submit" class="button button--primary btn btn-primary align-self-start" [disabled]="authorForm.invalid || catalog.isBusy()">
        {{ texts.submitLabel(editingAuthorId() !== null) }}
      </button>
      <a class="btn btn-outline-secondary" routerLink="/autores">{{ commonTexts.cancel }}</a>
    </div>
  </form>
</section>
