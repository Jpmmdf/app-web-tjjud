<section class="panel panel--govbr card border-0">
  <div class="panel__header">
    <div>
      <p class="eyebrow">{{ appTexts.eyebrow }}</p>
      <h2>{{ appTexts.overview.title }}</h2>
      <p class="text-muted mb-0">{{ appTexts.overview.detail }}</p>
    </div>
  </div>

  <div class="overview-grid">
    @for (section of sections; track section.path) {
      <article class="overview-card overview-card--govbr card border-0 h-100">
        <div class="overview-card__body">
          <h3>{{ section.label }}</h3>
          <p>{{ section.description }}</p>
        </div>

        <a class="btn btn-primary align-self-start" [routerLink]="section.path">
          Acessar {{ section.label.toLowerCase() }}
        </a>
      </article>
    }
  </div>
</section>
