name: Docs CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "scripts/export-structurizr.sh"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "scripts/export-structurizr.sh"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: docs-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configurar Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Instalar dependencias da documentacao
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-docs.txt

      - name: Exportar diagramas Structurizr
        run: |
          chmod +x scripts/export-structurizr.sh
          ./scripts/export-structurizr.sh

      - name: Gerar site do MkDocs
        shell: bash
        run: |
          SITE_URL="http://localhost:8000"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            SITE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/"
          fi
          export SITE_URL
          python - <<'PY'
          import os
          from pathlib import Path

          source = Path("mkdocs.yml").read_text(encoding="utf-8").splitlines()
          generated = []
          replaced = False

          for line in source:
              if line.startswith("site_url:"):
                  generated.append(f"site_url: {os.environ['SITE_URL']}")
                  replaced = True
              else:
                  generated.append(line)

          if not replaced:
              generated.insert(2, f"site_url: {os.environ['SITE_URL']}")

          Path("mkdocs.generated.yml").write_text("\n".join(generated) + "\n", encoding="utf-8")
          PY
          python -m mkdocs build --strict --site-dir site --config-file mkdocs.generated.yml

      - name: Publicar artefato do Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy Docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
