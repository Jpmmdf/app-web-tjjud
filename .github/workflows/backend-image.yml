name: Backend Docker Image

on:
  workflow_call:
    inputs:
      version:
        description: Semantic version to publish
        required: true
        type: string
      git_tag:
        description: Git tag created by Release Please
        required: true
        type: string
      push_latest:
        description: Also push the latest tag
        required: false
        default: true
        type: boolean
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to publish
        required: true
        type: string
      git_tag:
        description: Git tag created by Release Please
        required: true
        type: string
      push_latest:
        description: Also push the latest tag
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/app-web-tjjud-backend

jobs:
  publish:
    name: Publish Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Definir tags da imagem
        id: tags
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_GIT_TAG: ${{ inputs.git_tag }}
          INPUT_PUSH_LATEST: ${{ inputs.push_latest }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          VERSION="${INPUT_VERSION}"
          GIT_TAG="${INPUT_GIT_TAG}"
          PUSH_LATEST="${INPUT_PUSH_LATEST}"

          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${VERSION}"
            echo "${IMAGE_NAME}:${GIT_TAG}"
            if [[ "${PUSH_LATEST}" == "true" ]]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build e push da imagem do backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,mode=max,scope=backend-image
