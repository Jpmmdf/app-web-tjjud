name: Auto Approve Dependabot PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-approve:
    name: Auto Approve Dependabot PR
    if: >-
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'dependabot/') &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Validar secrets do GitHub App
        env:
          AUTOMATION_APP_ID: ${{ secrets.AUTOMATION_APP_ID }}
          AUTOMATION_APP_PRIVATE_KEY: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
        run: |
          if [ -z "$AUTOMATION_APP_ID" ] || [ -z "$AUTOMATION_APP_PRIVATE_KEY" ]; then
            echo "::error::Configure os secrets AUTOMATION_APP_ID e AUTOMATION_APP_PRIVATE_KEY para gerar o token do GitHub App."
            exit 1
          fi

      - name: Gerar token do GitHub App
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-pull-requests: write

      - name: Aprovar PR do Dependabot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr review "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --approve \
            --body "Aprovacao automatica da PR do Dependabot."
