name: Release Please

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      backend_release_created: ${{ steps.release.outputs['backend--release_created'] }}
      backend_version: ${{ steps.release.outputs['backend--version'] }}
      backend_tag_name: ${{ steps.release.outputs['backend--tag_name'] }}
      frontend_release_created: ${{ steps.release.outputs['frontend--release_created'] }}
      frontend_version: ${{ steps.release.outputs['frontend--version'] }}
      frontend_tag_name: ${{ steps.release.outputs['frontend--tag_name'] }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-labeling: true

  publish-backend:
    name: Publish Backend Image
    needs: release-please
    if: ${{ needs.release-please.outputs.backend_release_created == 'true' }}
    uses: ./.github/workflows/backend-image.yml
    with:
      version: ${{ needs.release-please.outputs.backend_version }}
      git_tag: ${{ needs.release-please.outputs.backend_tag_name }}
      push_latest: true
    secrets: inherit

  publish-frontend:
    name: Publish Frontend Image
    needs: release-please
    if: ${{ needs.release-please.outputs.frontend_release_created == 'true' }}
    uses: ./.github/workflows/frontend-image.yml
    with:
      version: ${{ needs.release-please.outputs.frontend_version }}
      git_tag: ${{ needs.release-please.outputs.frontend_tag_name }}
      push_latest: true
    secrets: inherit
