name: Release Please

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - name: Validar token do Release Please
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_PLEASE_TOKEN" ]; then
            echo "::error::Configure o secret RELEASE_PLEASE_TOKEN com um PAT ou token de bot para que tags e PRs de release possam disparar outros workflows."
            exit 1
          fi

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-labeling: true

  publish-backend:
    name: Publish Backend Image
    needs: release-please
    if: ${{ needs.release-please.outputs.backend_release_created == 'true' }}
    uses: ./.github/workflows/backend-image.yml
    with:
      version: ${{ needs.release-please.outputs.backend_version }}
      git_tag: ${{ needs.release-please.outputs.backend_tag_name }}
      push_latest: true
    secrets: inherit

  publish-frontend:
    name: Publish Frontend Image
    needs: release-please
    if: ${{ needs.release-please.outputs.frontend_release_created == 'true' }}
    uses: ./.github/workflows/frontend-image.yml
    with:
      version: ${{ needs.release-please.outputs.frontend_version }}
      git_tag: ${{ needs.release-please.outputs.frontend_tag_name }}
      push_latest: true
    secrets: inherit
