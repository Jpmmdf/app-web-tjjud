name: Backend CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    if: >-
      github.event_name != 'pull_request' ||
      !startsWith(github.event.pull_request.head.ref, 'release-please--branches--')
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configurar Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Garantir permissao do Maven Wrapper
        run: chmod +x mvnw

      - name: Executar verify do backend
        run: ./mvnw --batch-mode verify

      - name: Publicar artefato do backend
        uses: actions/upload-artifact@v7
        with:
          name: backend-jar
          path: backend/target/backend-*.jar
          if-no-files-found: error
