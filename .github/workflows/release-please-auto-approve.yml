name: Auto Approve Release PRs

on:
  workflow_run:
    workflows:
      - Release Please
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-approve:
    name: Auto Approve Release PR
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Validar secrets do GitHub App
        env:
          AUTOMATION_APP_ID: ${{ secrets.AUTOMATION_APP_ID }}
          AUTOMATION_APP_PRIVATE_KEY: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
        run: |
          if [ -z "$AUTOMATION_APP_ID" ] || [ -z "$AUTOMATION_APP_PRIVATE_KEY" ]; then
            echo "::error::Configure os secrets AUTOMATION_APP_ID e AUTOMATION_APP_PRIVATE_KEY para gerar o token do GitHub App."
            exit 1
          fi

      - name: Gerar token do GitHub App
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-pull-requests: write

      - name: Aprovar PRs de release abertas pelo Release Please
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          RELEASE_PRS="$(
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --state open \
              --base main \
              --json number,title,headRefName,author \
              --jq '.[] | select(.author.login == "app/github-actions") | select(.headRefName | startswith("release-please--branches--")) | select(.title | startswith("chore(main): release ")) | @base64'
          )"

          if [ -z "$RELEASE_PRS" ]; then
            echo "Nenhuma PR de release pendente para aprovar."
            exit 0
          fi

          while IFS= read -r encoded_pr; do
            [ -z "$encoded_pr" ] && continue

            pr_json="$(printf '%s' "$encoded_pr" | base64 --decode)"
            pr_number="$(printf '%s' "$pr_json" | jq -r '.number')"

            gh pr review "$pr_number" \
              --repo "$GITHUB_REPOSITORY" \
              --approve \
              --body "Aprovacao automatica da PR de release."
          done <<< "$RELEASE_PRS"
