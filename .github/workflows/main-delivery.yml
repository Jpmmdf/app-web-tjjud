name: Main Delivery

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - ".nvmrc"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: main-delivery-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detectar mudancas
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.filter.outputs.backend_changed }}
      frontend_changed: ${{ steps.filter.outputs.frontend_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detectar areas alteradas
        id: filter
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          backend_changed=false
          frontend_changed=false

          changed_files="$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")"

          if printf '%s\n' "$changed_files" | grep -q '^backend/'; then
            backend_changed=true
          fi

          if printf '%s\n' "$changed_files" | grep -Eq '^(frontend/|\.nvmrc$)'; then
            frontend_changed=true
          fi

          echo "backend_changed=$backend_changed" >> "$GITHUB_OUTPUT"
          echo "frontend_changed=$frontend_changed" >> "$GITHUB_OUTPUT"

  backend-ci:
    name: Backend CI
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend_changed == 'true' }}
    uses: ./.github/workflows/backend-ci.yml

  frontend-ci:
    name: Frontend CI
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend_changed == 'true' }}
    uses: ./.github/workflows/frontend-ci.yml

  backend-release:
    name: Release Backend
    needs:
      - detect-changes
      - backend-ci
    if: ${{ needs.detect-changes.outputs.backend_changed == 'true' && needs.backend-ci.result == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_ready: ${{ steps.publish.outputs.release_ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Buscar tags do repositorio
        run: git fetch --force --tags origin

      - name: Descobrir versao do backend
        id: meta
        run: |
          VERSION="$(ruby -e "content = File.read('backend/pom.xml'); after_artifact = content.split('<artifactId>backend</artifactId>', 2)[1] or abort; match = after_artifact.match(/<version>([^<]+)<\\/version>/) or abort; puts match[1]")"

          if [ -z "$VERSION" ]; then
            echo "::error::Nao foi possivel descobrir a versao do backend em backend/pom.xml."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=backend-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configurar identidade do Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Criar release do backend
        id: publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
        run: |
          EXISTING_TAG_SHA="$(git rev-list -n 1 "refs/tags/$TAG_NAME" 2>/dev/null || true)"

          if [ -n "$EXISTING_TAG_SHA" ] && [ "$EXISTING_TAG_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::A tag $TAG_NAME ja existe para outro commit. Atualize a versao do backend em backend/pom.xml antes de fazer merge na main."
            exit 1
          fi

          if [ -n "$EXISTING_TAG_SHA" ] && gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG_NAME ja existe para este commit. Reaproveitando a versao."
            echo "release_ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$EXISTING_TAG_SHA" ]; then
            git tag -a "$TAG_NAME" "$GITHUB_SHA" -m "Release $TAG_NAME"
            git push origin "refs/tags/$TAG_NAME"
          fi

          cat > backend-release-notes.md <<EOF
          Release automatica do backend apos merge aprovado na main.

          Versao: $VERSION
          Commit: $GITHUB_SHA
          EOF

          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "Backend v$VERSION" \
            --notes-file backend-release-notes.md

          echo "release_ready=true" >> "$GITHUB_OUTPUT"

  frontend-release:
    name: Release Frontend
    needs:
      - detect-changes
      - frontend-ci
    if: ${{ needs.detect-changes.outputs.frontend_changed == 'true' && needs.frontend-ci.result == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_ready: ${{ steps.publish.outputs.release_ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Buscar tags do repositorio
        run: git fetch --force --tags origin

      - name: Descobrir versao do frontend
        id: meta
        run: |
          VERSION="$(jq -r '.version' frontend/package.json)"

          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Nao foi possivel descobrir a versao do frontend em frontend/package.json."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=frontend-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configurar identidade do Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Criar release do frontend
        id: publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
        run: |
          EXISTING_TAG_SHA="$(git rev-list -n 1 "refs/tags/$TAG_NAME" 2>/dev/null || true)"

          if [ -n "$EXISTING_TAG_SHA" ] && [ "$EXISTING_TAG_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::A tag $TAG_NAME ja existe para outro commit. Atualize a versao do frontend em frontend/package.json antes de fazer merge na main."
            exit 1
          fi

          if [ -n "$EXISTING_TAG_SHA" ] && gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG_NAME ja existe para este commit. Reaproveitando a versao."
            echo "release_ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$EXISTING_TAG_SHA" ]; then
            git tag -a "$TAG_NAME" "$GITHUB_SHA" -m "Release $TAG_NAME"
            git push origin "refs/tags/$TAG_NAME"
          fi

          cat > frontend-release-notes.md <<EOF
          Release automatica do frontend apos merge aprovado na main.

          Versao: $VERSION
          Commit: $GITHUB_SHA
          EOF

          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "Frontend v$VERSION" \
            --notes-file frontend-release-notes.md

          echo "release_ready=true" >> "$GITHUB_OUTPUT"

  publish-backend:
    name: Publish Backend Image
    needs: backend-release
    if: ${{ needs.backend-release.outputs.release_ready == 'true' }}
    uses: ./.github/workflows/backend-image.yml
    with:
      version: ${{ needs.backend-release.outputs.version }}
      git_tag: ${{ needs.backend-release.outputs.tag_name }}
      push_latest: true
    secrets: inherit

  publish-frontend:
    name: Publish Frontend Image
    needs: frontend-release
    if: ${{ needs.frontend-release.outputs.release_ready == 'true' }}
    uses: ./.github/workflows/frontend-image.yml
    with:
      version: ${{ needs.frontend-release.outputs.version }}
      git_tag: ${{ needs.frontend-release.outputs.tag_name }}
      push_latest: true
    secrets: inherit
