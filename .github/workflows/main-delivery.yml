name: Main Delivery

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - ".nvmrc"
  workflow_dispatch:
    inputs:
      backend_bump:
        description: Incremento de versao do backend
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      frontend_bump:
        description: Incremento de versao do frontend
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: main-delivery-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detectar mudancas
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.filter.outputs.backend_changed }}
      frontend_changed: ${{ steps.filter.outputs.frontend_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detectar areas alteradas
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          backend_changed=false
          frontend_changed=false

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Execucao manual detectada. Backend e frontend serao processados integralmente."
            backend_changed=true
            frontend_changed=true
          else
            changed_files="$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")"

            if printf '%s\n' "$changed_files" | grep -q '^backend/'; then
              backend_changed=true
            fi

            if printf '%s\n' "$changed_files" | grep -Eq '^(frontend/|\.nvmrc$)'; then
              frontend_changed=true
            fi
          fi

          echo "backend_changed=$backend_changed" >> "$GITHUB_OUTPUT"
          echo "frontend_changed=$frontend_changed" >> "$GITHUB_OUTPUT"

  backend-ci:
    name: Backend CI
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend_changed == 'true' }}
    uses: ./.github/workflows/backend-ci.yml

  frontend-ci:
    name: Frontend CI
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend_changed == 'true' }}
    uses: ./.github/workflows/frontend-ci.yml

  backend-release:
    name: Release Backend
    needs:
      - detect-changes
      - backend-ci
    if: ${{ needs.detect-changes.outputs.backend_changed == 'true' && needs.backend-ci.result == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_ready: ${{ steps.publish.outputs.release_ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Buscar tags do repositorio
        run: git fetch --force --tags origin

      - name: Descobrir versao do backend
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_BUMP: ${{ inputs.backend_bump }}
        run: |
          BUMP_LEVEL="patch"

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_BUMP" ]; then
            BUMP_LEVEL="$INPUT_BUMP"
          fi

          ./.github/scripts/resolve-version.sh "backend-" "$BUMP_LEVEL" "$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - name: Configurar identidade do Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Criar release do backend
        id: publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
        run: |
          EXISTING_TAG_SHA="$(git rev-list -n 1 "refs/tags/$TAG_NAME" 2>/dev/null || true)"

          if [ -n "$EXISTING_TAG_SHA" ] && [ "$EXISTING_TAG_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::A tag $TAG_NAME foi criada por outra execucao concorrente. Rode a pipeline novamente."
            exit 1
          fi

          if [ -n "$EXISTING_TAG_SHA" ] && gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG_NAME ja existe para este commit. Reaproveitando a versao."
            echo "release_ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$EXISTING_TAG_SHA" ]; then
            git tag -a "$TAG_NAME" "$GITHUB_SHA" -m "Release $TAG_NAME"
            git push origin "refs/tags/$TAG_NAME"
          fi

          cat > backend-release-notes.md <<EOF
          Release automatica do backend apos merge aprovado na main.

          Versao: $VERSION
          Commit: $GITHUB_SHA
          EOF

          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "Backend v$VERSION" \
            --notes-file backend-release-notes.md

          echo "release_ready=true" >> "$GITHUB_OUTPUT"

  frontend-release:
    name: Release Frontend
    needs:
      - detect-changes
      - frontend-ci
    if: ${{ needs.detect-changes.outputs.frontend_changed == 'true' && needs.frontend-ci.result == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_ready: ${{ steps.publish.outputs.release_ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Buscar tags do repositorio
        run: git fetch --force --tags origin

      - name: Descobrir versao do frontend
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_BUMP: ${{ inputs.frontend_bump }}
        run: |
          BUMP_LEVEL="patch"

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_BUMP" ]; then
            BUMP_LEVEL="$INPUT_BUMP"
          fi

          ./.github/scripts/resolve-version.sh "frontend-" "$BUMP_LEVEL" "$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - name: Configurar identidade do Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Criar release do frontend
        id: publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
        run: |
          EXISTING_TAG_SHA="$(git rev-list -n 1 "refs/tags/$TAG_NAME" 2>/dev/null || true)"

          if [ -n "$EXISTING_TAG_SHA" ] && [ "$EXISTING_TAG_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::A tag $TAG_NAME foi criada por outra execucao concorrente. Rode a pipeline novamente."
            exit 1
          fi

          if [ -n "$EXISTING_TAG_SHA" ] && gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG_NAME ja existe para este commit. Reaproveitando a versao."
            echo "release_ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$EXISTING_TAG_SHA" ]; then
            git tag -a "$TAG_NAME" "$GITHUB_SHA" -m "Release $TAG_NAME"
            git push origin "refs/tags/$TAG_NAME"
          fi

          cat > frontend-release-notes.md <<EOF
          Release automatica do frontend apos merge aprovado na main.

          Versao: $VERSION
          Commit: $GITHUB_SHA
          EOF

          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "Frontend v$VERSION" \
            --notes-file frontend-release-notes.md

          echo "release_ready=true" >> "$GITHUB_OUTPUT"

  publish-backend:
    name: Publish Backend Image
    needs: backend-release
    if: ${{ needs.backend-release.outputs.release_ready == 'true' }}
    uses: ./.github/workflows/backend-image.yml
    with:
      version: ${{ needs.backend-release.outputs.version }}
      push_latest: true
    secrets: inherit

  publish-frontend:
    name: Publish Frontend Image
    needs: frontend-release
    if: ${{ needs.frontend-release.outputs.release_ready == 'true' }}
    uses: ./.github/workflows/frontend-image.yml
    with:
      version: ${{ needs.frontend-release.outputs.version }}
      push_latest: true
    secrets: inherit

  update-demo-deployment:
    name: Update Demo Deployment
    needs:
      - detect-changes
      - backend-release
      - frontend-release
      - publish-backend
      - publish-frontend
    if: >-
      ${{
        always() &&
        (
          (needs.detect-changes.outputs.backend_changed == 'true' && needs.publish-backend.result == 'success') ||
          (needs.detect-changes.outputs.frontend_changed == 'true' && needs.publish-frontend.result == 'success')
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Buscar tags do repositorio
        run: git fetch --force --tags origin

      - name: Atualizar versoes do ambiente demo
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          BACKEND_CHANGED: ${{ needs.detect-changes.outputs.backend_changed }}
          FRONTEND_CHANGED: ${{ needs.detect-changes.outputs.frontend_changed }}
          BACKEND_VERSION: ${{ needs.backend-release.outputs.version }}
          FRONTEND_VERSION: ${{ needs.frontend-release.outputs.version }}
        run: |
          latest_component_version() {
            local prefix="$1"
            local latest_tag

            latest_tag="$(git tag --list "${prefix}v*" | LC_ALL=C sort -V | tail -n 1 || true)"

            if [ -z "$latest_tag" ]; then
              return 1
            fi

            echo "${latest_tag#${prefix}v}"
          }

          FILE="k8s/demo/versions.env"
          CURRENT_BACKEND_IMAGE="$(grep '^BACKEND_IMAGE=' "$FILE" | cut -d= -f2-)"
          CURRENT_FRONTEND_IMAGE="$(grep '^FRONTEND_IMAGE=' "$FILE" | cut -d= -f2-)"
          CURRENT_APP_VERSION="$(grep '^APP_VERSION=' "$FILE" | cut -d= -f2-)"

          RESOLVED_BACKEND_VERSION="$(latest_component_version backend- || true)"
          RESOLVED_FRONTEND_VERSION="$(latest_component_version frontend- || true)"

          BACKEND_IMAGE="$CURRENT_BACKEND_IMAGE"
          FRONTEND_IMAGE="$CURRENT_FRONTEND_IMAGE"
          APP_VERSION="$CURRENT_APP_VERSION"

          if [ -n "$RESOLVED_BACKEND_VERSION" ]; then
            BACKEND_IMAGE="${DOCKER_USERNAME}/app-web-tjjud-backend:${RESOLVED_BACKEND_VERSION}"
            APP_VERSION="$RESOLVED_BACKEND_VERSION"
          fi

          if [ -n "$RESOLVED_FRONTEND_VERSION" ]; then
            FRONTEND_IMAGE="${DOCKER_USERNAME}/app-web-tjjud-frontend:${RESOLVED_FRONTEND_VERSION}"
          fi

          if [ "$BACKEND_CHANGED" = "true" ] && [ -n "$BACKEND_VERSION" ]; then
            BACKEND_IMAGE="${DOCKER_USERNAME}/app-web-tjjud-backend:${BACKEND_VERSION}"
            APP_VERSION="$BACKEND_VERSION"
          fi

          if [ "$FRONTEND_CHANGED" = "true" ] && [ -n "$FRONTEND_VERSION" ]; then
            FRONTEND_IMAGE="${DOCKER_USERNAME}/app-web-tjjud-frontend:${FRONTEND_VERSION}"
          fi

          cat > "$FILE" <<EOF
          BACKEND_IMAGE=$BACKEND_IMAGE
          FRONTEND_IMAGE=$FRONTEND_IMAGE
          APP_VERSION=$APP_VERSION
          EOF

      - name: Commitar atualizacao de deployment
        run: |
          if git diff --quiet -- k8s/demo/versions.env; then
            echo "Nenhuma alteracao de versao para commitar."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/demo/versions.env
          git commit -m "chore: update demo deployment versions"
          git push origin HEAD:main
