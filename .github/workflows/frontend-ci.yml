name: Frontend CI

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".nvmrc"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    if: >-
      github.event_name != 'pull_request' ||
      !startsWith(github.event.pull_request.head.ref, 'release-please--branches--')
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configurar Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Executar testes do frontend
        env:
          CI: "true"
        run: |
          CHROME_BIN="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser || command -v chromium)"
          if [ -z "$CHROME_BIN" ]; then
            echo "Chrome ou Chromium nao encontrado no runner." >&2
            exit 1
          fi
          export CHROME_BIN
          npm test

      - name: Gerar build do frontend
        run: npm run build

      - name: Publicar artefato do frontend
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/frontend/browser
          if-no-files-found: error
