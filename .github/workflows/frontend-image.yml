name: Frontend Docker Image

on:
  push:
    tags:
      - "frontend-v*"
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to publish
        required: true
        type: string
      git_tag:
        description: Git tag created by Release Please
        required: true
        type: string
      push_latest:
        description: Also push the latest tag
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/app-web-tjjud-frontend

jobs:
  publish:
    name: Publish Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Definir tags da imagem
        id: tags
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_GIT_TAG: ${{ inputs.git_tag }}
          INPUT_PUSH_LATEST: ${{ inputs.push_latest }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          if [[ "${EVENT_NAME}" == "push" ]]; then
            VERSION="${REF_NAME#frontend-v}"
            GIT_TAG="${REF_NAME}"
            PUSH_LATEST="true"
          else
            VERSION="${INPUT_VERSION}"
            GIT_TAG="${INPUT_GIT_TAG}"
            PUSH_LATEST="${INPUT_PUSH_LATEST}"
          fi

          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${VERSION}"
            echo "${IMAGE_NAME}:${GIT_TAG}"
            if [[ "${PUSH_LATEST}" == "true" ]]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build e push da imagem do frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,mode=max,scope=frontend-image
