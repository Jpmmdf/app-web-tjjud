name: Application CI

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "scripts/export-structurizr.sh"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "scripts/export-structurizr.sh"

permissions:
  contents: read

concurrency:
  group: application-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Garantir permissao do Maven Wrapper
        run: chmod +x mvnw

      - name: Executar verify do backend
        run: ./mvnw --batch-mode verify

      - name: Publicar artefato do backend
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/backend-0.0.1-SNAPSHOT.jar
          if-no-files-found: error

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Executar testes do frontend
        env:
          CI: "true"
        run: |
          CHROME_BIN="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser || command -v chromium)"
          if [ -z "$CHROME_BIN" ]; then
            echo "Chrome ou Chromium nao encontrado no runner." >&2
            exit 1
          fi
          export CHROME_BIN
          npm test

      - name: Gerar build do frontend
        run: npm run build

      - name: Publicar artefato do frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/frontend/browser
          if-no-files-found: error
