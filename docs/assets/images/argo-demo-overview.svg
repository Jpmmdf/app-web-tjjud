<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">Estado da demo no Argo CD</title>
  <desc id="desc">Ilustracao simplificada da aplicacao app-web-tjjud-demo no Argo CD, com status Healthy e Synced e a arvore principal de recursos.</desc>
  <rect width="1400" height="860" fill="#eef3f8"/>
  <rect x="24" y="24" width="1352" height="812" rx="20" fill="#ffffff" stroke="#d8e0eb"/>
  <g font-family="Arial, Helvetica, sans-serif">
