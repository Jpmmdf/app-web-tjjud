    <text x="56" y="104" font-size="18" fill="#5b6573">Argo CD sincronizando a branch main e os manifests em k8s/demo</text>

    <rect x="56" y="136" width="280" height="108" rx="18" fill="#f7fbff" stroke="#c7d2df"/>
    <text x="84" y="174" font-size="18" fill="#5b6573">APP HEALTH</text>
    <text x="84" y="220" font-size="42" font-weight="700" fill="#0f9d58">Healthy</text>

