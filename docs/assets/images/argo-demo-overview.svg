      <rect x="592" y="336" width="248" height="80" rx="14" fill="#ffffff" stroke="#c7d2df"/>
      <text x="620" y="368" font-size="20" font-weight="700" fill="#1f2937">app-web-tjjud-demo</text>
      <text x="620" y="394" font-size="15" fill="#5b6573">Namespace</text>
    </g>

