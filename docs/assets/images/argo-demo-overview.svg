      <rect x="592" y="516" width="248" height="80" rx="14" fill="#ffffff" stroke="#c7d2df"/>
      <text x="620" y="548" font-size="20" font-weight="700" fill="#1f2937">frontend</text>
      <text x="620" y="574" font-size="15" fill="#5b6573">Service + Deployment + Pod</text>
    </g>

    <g>
