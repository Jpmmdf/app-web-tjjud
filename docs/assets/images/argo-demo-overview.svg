    <text x="392" y="220" font-size="42" font-weight="700" fill="#0f9d58">Synced to main</text>

    <rect x="752" y="136" width="360" height="108" rx="18" fill="#f7fbff" stroke="#c7d2df"/>
    <text x="780" y="174" font-size="18" fill="#5b6573">LAST SYNC</text>
    <text x="780" y="220" font-size="34" font-weight="700" fill="#0f9d58">Sync OK</text>

    <circle cx="116" cy="430" r="34" fill="#8ba3b8"/>
