<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">Fluxo principal de entrega</title>
  <desc id="desc">Ilustracao do workflow Main Delivery com deteccao de mudancas, CI de backend e frontend, release e publicacao Docker.</desc>
  <rect width="1400" height="520" fill="#f5f7fb"/>
  <rect x="24" y="24" width="1352" height="472" rx="20" fill="#ffffff" stroke="#d8e0eb"/>
  <text x="56" y="74" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#1f2937">Main Delivery</text>
  <text x="56" y="106" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#5b6573">Pipeline unica da main para CI, release e publicacao Docker</text>

  <g font-family="Arial, Helvetica, sans-serif">
