services:
  postgres:
    image: postgres:16-alpine
    container_name: tjjud-postgres
    environment:
      POSTGRES_DB: tjjud_catalog
      POSTGRES_USER: tjjud
      POSTGRES_PASSWORD: tjjud
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tjjud -d tjjud_catalog"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: tjjud-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  backend:
    build:
      context: ./backend
    container_name: tjjud-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/tjjud_catalog
      DB_USERNAME: tjjud
      DB_PASSWORD: tjjud
      SERVER_PORT: 8080
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      MANAGEMENT_OTLP_TRACING_TRANSPORT: http
      OTEL_ENVIRONMENT: local-docker
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep -q 'UP'"]
      interval: 15s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend
    container_name: tjjud-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4200:80"

volumes:
  postgres-data:
